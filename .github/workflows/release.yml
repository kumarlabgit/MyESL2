name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Pre-compiled OpenBLAS+LAPACK libraries live in deps/ per platform.
# Armadillo version is read from deps.env for the header download.

jobs:
  build-and-test:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            artifact: myesl2-linux-x64
            aln_list: Fungi_data/aln_200_linux.txt
          - os: macos-latest
            artifact: myesl2-macos-arm64
            aln_list: Fungi_data/aln_200_linux.txt
          - os: windows-latest
            artifact: myesl2-windows-x64
            aln_list: Fungi_data/aln_200.txt

    runs-on: ${{ matrix.os }}
    name: Build & Test (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      # ── Runtime dependencies ──────────────────────────────────────
      - name: Install gfortran runtime (macOS)
        if: runner.os == 'macOS'
        run: brew install gcc

      # ── Install Armadillo headers ─────────────────────────────────
      - name: Install Armadillo headers (pinned version from deps.env)
        shell: bash
        run: |
          source deps.env
          echo "Installing Armadillo $ARMADILLO_VERSION"
          curl -L -o armadillo.tar.xz \
            "https://sourceforge.net/projects/arma/files/armadillo-${ARMADILLO_VERSION}.tar.xz/download"
          tar xf armadillo.tar.xz
          cp armadillo-${ARMADILLO_VERSION}/include/armadillo include/armadillo
          cp -r armadillo-${ARMADILLO_VERSION}/include/armadillo_bits include/armadillo_bits

      # ── Build ─────────────────────────────────────────────────────
      - name: Configure
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      # ── Regression test ───────────────────────────────────────────
      - name: Run drphylo regression test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./build/bin/myesl2 drphylo \
            "${{ matrix.aln_list }}" \
            Fungi_data/Fungi_T1_with_ID.nwk \
            ci_output \
            --clade-list Fungi_data/clade_multiple.txt \
            --lambda-grid "0.1,0.2,0.1" "0.1,0.2,0.1" \
            --threads 1

      - name: Run drphylo regression test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./build/bin/Release/myesl2.exe drphylo \
            "${{ matrix.aln_list }}" \
            Fungi_data/Fungi_T1_with_ID.nwk \
            ci_output \
            --clade-list Fungi_data/clade_multiple.txt \
            --lambda-grid "0.1,0.2,0.1" "0.1,0.2,0.1" \
            --threads 1

      - name: Compare against golden files
        shell: bash
        run: bash test/compare_golden.sh ci_output test/golden

      # ── Upload artifacts ──────────────────────────────────────────
      # Each platform's binary + bundled runtime libraries are packaged
      # into a single archive so the released assets don't collide across
      # builds (e.g. linux-x64 vs linux-x64-portable both shipping
      # libopenblas.so). setup.sh / setup.ps1 download the archive and
      # extract it into ./bin/.
      - name: Prepare binary archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          stage=$(mktemp -d)
          cp build/bin/myesl2 "$stage/myesl2"
          cp build/bin/libopenblas* "$stage/" 2>/dev/null || true
          cp build/bin/libgfortran* "$stage/" 2>/dev/null || true
          cp build/bin/libquadmath* "$stage/" 2>/dev/null || true
          # Fallback: if CMake didn't copy the Fortran runtime, grab from system
          if ! ls "$stage"/libgfortran* 1>/dev/null 2>&1; then
            if [[ "$(uname -s)" == "Darwin" ]]; then
              GFORT=$(find /opt/homebrew/lib/gcc -name "libgfortran.5.dylib" 2>/dev/null | head -1)
              [ -f "$GFORT" ] || { echo "ERROR: cannot find libgfortran.5.dylib in Homebrew GCC" >&2; exit 1; }
              cp "$GFORT" "$stage/libgfortran.5.dylib"
              QUAD=$(find /opt/homebrew/lib/gcc -name "libquadmath.0.dylib" 2>/dev/null | head -1)
              [ -f "$QUAD" ] || { echo "ERROR: cannot find libquadmath.0.dylib in Homebrew GCC" >&2; exit 1; }
              cp "$QUAD" "$stage/libquadmath.0.dylib"
            else
              GFORT=$(gfortran --print-file-name=libgfortran.so.5 2>/dev/null \
                      || gcc --print-file-name=libgfortran.so.5 2>/dev/null)
              [ -f "$GFORT" ] || { echo "ERROR: cannot find libgfortran.so.5" >&2; exit 1; }
              cp "$(realpath "$GFORT")" "$stage/libgfortran.so.5"
            fi
          fi
          mkdir -p artifact
          tar -czf "artifact/${{ matrix.artifact }}.tar.gz" -C "$stage" .

      - name: Prepare binary archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          stage=$(mktemp -d)
          cp build/bin/Release/myesl2.exe "$stage/myesl2.exe"
          cp build/bin/Release/*.dll "$stage/" 2>/dev/null || true
          mkdir -p artifact
          (cd "$stage" && 7z a -tzip "$OLDPWD/artifact/${{ matrix.artifact }}.zip" .)

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact/

  # ── Portable Linux build (glibc 2.17, RHEL 7 / older HPC) ──────
  # Builds inside manylinux2014 (CentOS 7, glibc 2.17) and rebuilds
  # OpenBLAS from source so the resulting bundle runs on any Linux
  # with glibc ≥ 2.17. Runs in parallel with the matrix job above.
  #
  # NOTE: We can't use the `container:` GH Actions field here. The runner
  # would then inject its Node 20 binary into the container, but Node 20
  # is built against glibc ≥ 2.27 and won't load on glibc 2.17, so even
  # actions/checkout fails. Instead we keep the job on ubuntu-latest
  # (where checkout/upload-artifact work) and shell into manylinux2014
  # via a single `docker run` for the actual build.
  build-linux-portable:
    runs-on: ubuntu-latest
    name: Build & Test (linux-x64-portable, glibc 2.17)

    steps:
      - uses: actions/checkout@v4

      - name: Build, test, and verify inside manylinux2014 container
        run: |
          docker run --rm -i \
            -v "$PWD:/work" -w /work \
            quay.io/pypa/manylinux2014_x86_64:latest \
            bash <<'INNER'
          set -euxo pipefail
          git config --global --add safe.directory '*'
          source deps.env

          # ── Armadillo headers (pinned in deps.env) ──
          echo "Installing Armadillo $ARMADILLO_VERSION"
          curl -L -o armadillo.tar.xz \
            "https://sourceforge.net/projects/arma/files/armadillo-${ARMADILLO_VERSION}.tar.xz/download"
          tar xf armadillo.tar.xz
          cp armadillo-${ARMADILLO_VERSION}/include/armadillo include/armadillo
          cp -r armadillo-${ARMADILLO_VERSION}/include/armadillo_bits include/armadillo_bits

          # ── OpenBLAS from source ──
          # Match the vendored binary's build flags (DYNAMIC_ARCH, NO_AFFINITY)
          # so behaviour matches the non-portable Linux artifact.
          echo "Building OpenBLAS $OPENBLAS_VERSION"
          curl -L -o openblas.tar.gz \
            "https://github.com/OpenMathLib/OpenBLAS/releases/download/v${OPENBLAS_VERSION}/OpenBLAS-${OPENBLAS_VERSION}.tar.gz"
          tar xf openblas.tar.gz
          pushd OpenBLAS-${OPENBLAS_VERSION}
          make -j"$(nproc)" \
            DYNAMIC_ARCH=1 NO_AFFINITY=1 USE_THREAD=1 NUM_THREADS=64 \
            CC=gcc FC=gfortran
          make install PREFIX=/work/openblas-install
          popd
          # Overwrite the vendored deps so the existing CMakeLists.txt
          # target_link_libraries path resolves to the portable copy.
          cp -P /work/openblas-install/lib/libopenblas.so* deps/linux-x64/

          # ── libgfortran.so.5 from the container's GCC ──
          GFORT=$(gcc --print-file-name=libgfortran.so.5)
          [ -f "$GFORT" ] || { echo "ERROR: libgfortran.so.5 not found in manylinux container" >&2; exit 1; }
          cp "$(realpath "$GFORT")" deps/linux-x64/libgfortran.so.5

          # ── Configure + build myesl2 ──
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

          # ── Regression test ──
          ./build/bin/myesl2 drphylo \
            Fungi_data/aln_200_linux.txt \
            Fungi_data/Fungi_T1_with_ID.nwk \
            ci_output \
            --clade-list Fungi_data/clade_multiple.txt \
            --lambda-grid "0.1,0.2,0.1" "0.1,0.2,0.1" \
            --threads 1
          bash test/compare_golden.sh ci_output test/golden

          # ── Guardrail: fail if anything pulls in glibc > 2.17 ──
          MAX=$(objdump -T build/bin/myesl2 build/bin/libopenblas.so.0 build/bin/libgfortran.so.5 \
                | grep -oE 'GLIBC_[0-9.]+' | sort -V -u | tail -1)
          echo "Max GLIBC required across binary + bundled libs: $MAX"
          HIGHEST=$(printf 'GLIBC_2.17\n%s\n' "$MAX" | sort -V | tail -1)
          if [[ "$HIGHEST" != "GLIBC_2.17" ]]; then
            echo "ERROR: bundle requires $MAX, exceeds RHEL 7 baseline (GLIBC_2.17)" >&2
            exit 1
          fi
          INNER

      # Files in build/ are root-owned (created inside the container) but
      # remain world-readable, so cp on the host runner works fine.
      - name: Prepare binary archive
        shell: bash
        run: |
          stage=$(mktemp -d)
          cp build/bin/myesl2 "$stage/myesl2"
          cp build/bin/libopenblas* "$stage/" 2>/dev/null || true
          cp build/bin/libgfortran* "$stage/" 2>/dev/null || true
          mkdir -p artifact
          tar -czf artifact/myesl2-linux-x64-portable.tar.gz -C "$stage" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: myesl2-linux-x64-portable
          path: artifact/

  # ── Publish release ─────────────────────────────────────────────
  publish:
    needs: [build-and-test, build-linux-portable]
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/myesl2-linux-x64/*
            artifacts/myesl2-linux-x64-portable/*
            artifacts/myesl2-macos-arm64/*
            artifacts/myesl2-windows-x64/*
