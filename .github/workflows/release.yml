name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-test:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            artifact: myesl2-linux-x64
            aln_list: Fungi_data/aln_200_linux.txt
          - os: macos-latest
            artifact: myesl2-macos-arm64
            aln_list: Fungi_data/aln_200_linux.txt
          - os: windows-latest
            artifact: myesl2-windows-x64
            aln_list: Fungi_data/aln_200.txt

    runs-on: ${{ matrix.os }}
    name: Build & Test (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      # ── Install dependencies ──────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarmadillo-dev libopenblas-dev liblapack-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install armadillo openblas lapack

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install openblas lapack --triplet x64-windows
          INSTALLED="$VCPKG_INSTALLATION_ROOT/installed/x64-windows"
          cp "$INSTALLED/lib/openblas.lib" include/libopenblas.lib
          cp "$INSTALLED/bin/openblas.dll" include/libopenblas.dll
          cp "$INSTALLED/lib/lapack.lib"   include/liblapack.lib
          cp "$INSTALLED/bin/lapack.dll"   include/liblapack.dll
          curl -L -o armadillo.tar.xz https://sourceforge.net/projects/arma/files/armadillo-14.2.2.tar.xz/download
          tar xf armadillo.tar.xz
          cp armadillo-*/include/armadillo include/armadillo
          cp -r armadillo-*/include/armadillo_bits include/armadillo_bits

      # ── Build ─────────────────────────────────────────────────────
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      # ── Regression test ───────────────────────────────────────────
      - name: Run drphylo regression test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./build/bin/myesl2 drphylo \
            "${{ matrix.aln_list }}" \
            Fungi_data/Fungi_T1_with_ID.nwk \
            ci_output \
            --clade-list Fungi_data/clade_multiple.txt \
            --lambda-grid "0.1,0.2,0.1" "0.1,0.2,0.1" \
            --threads 1

      - name: Run drphylo regression test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./build/bin/Release/myesl2.exe drphylo \
            "${{ matrix.aln_list }}" \
            Fungi_data/Fungi_T1_with_ID.nwk \
            ci_output \
            --clade-list Fungi_data/clade_multiple.txt \
            --lambda-grid "0.1,0.2,0.1" "0.1,0.2,0.1" \
            --threads 1

      - name: Compare against golden files
        shell: bash
        run: bash test/compare_golden.sh ci_output test/golden

      # ── Upload artifact ───────────────────────────────────────────
      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifact
          cp build/bin/myesl2 artifact/${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifact
          cp build/bin/Release/myesl2.exe artifact/${{ matrix.artifact }}.exe
          cp build/bin/Release/*.dll artifact/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact/

  # ── Publish release ─────────────────────────────────────────────
  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/myesl2-linux-x64/*
            artifacts/myesl2-macos-arm64/*
            artifacts/myesl2-windows-x64/*
