name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pre-compiled OpenBLAS+LAPACK libraries live in deps/ per platform.
# Armadillo version is read from deps.env for the header download.

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: myesl2-linux-x64
            aln_list: Fungi_data/aln_200_linux.txt
          - os: macos-latest
            artifact: myesl2-macos-arm64
            aln_list: Fungi_data/aln_200_linux.txt
          - os: windows-latest
            artifact: myesl2-windows-x64
            aln_list: Fungi_data/aln_200.txt

    runs-on: ${{ matrix.os }}
    name: Build & Test (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      # ── Runtime dependencies ──────────────────────────────────────
      - name: Install gfortran runtime (macOS)
        if: runner.os == 'macOS'
        run: brew install gcc

      # ── Install Armadillo headers ─────────────────────────────────
      - name: Install Armadillo headers (pinned version from deps.env)
        shell: bash
        run: |
          source deps.env
          echo "Installing Armadillo $ARMADILLO_VERSION"
          curl -L -o armadillo.tar.xz \
            "https://sourceforge.net/projects/arma/files/armadillo-${ARMADILLO_VERSION}.tar.xz/download"
          tar xf armadillo.tar.xz
          cp armadillo-${ARMADILLO_VERSION}/include/armadillo include/armadillo
          cp -r armadillo-${ARMADILLO_VERSION}/include/armadillo_bits include/armadillo_bits

      # ── Build ─────────────────────────────────────────────────────
      - name: Configure
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      # ── Regression test ───────────────────────────────────────────
      - name: Run drphylo regression test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./build/bin/myesl2 drphylo \
            "${{ matrix.aln_list }}" \
            Fungi_data/Fungi_T1_with_ID.nwk \
            ci_output \
            --clade-list Fungi_data/clade_multiple.txt \
            --lambda-grid "0.1,0.2,0.1" "0.1,0.2,0.1" \
            --threads 1

      - name: Run drphylo regression test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./build/bin/Release/myesl2.exe drphylo \
            "${{ matrix.aln_list }}" \
            Fungi_data/Fungi_T1_with_ID.nwk \
            ci_output \
            --clade-list Fungi_data/clade_multiple.txt \
            --lambda-grid "0.1,0.2,0.1" "0.1,0.2,0.1" \
            --threads 1

      - name: Compare against golden files
        shell: bash
        run: bash test/compare_golden.sh ci_output test/golden

      # ── Upload artifacts ──────────────────────────────────────────
      - name: Upload test output (for golden file regeneration)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}
          path: |
            ci_output/hss_summary.txt
            ci_output/Control/eval.txt
            ci_output/Control/eval_SPS_SPP.txt
            ci_output/Control/eval_gene_predictions.txt
            ci_output/Control/gss_median.txt
            ci_output/Control/pss_median.txt
            ci_output/Control/bss_median.txt
            ci_output/Clade_X1/eval.txt
            ci_output/Clade_X1/eval_SPS_SPP.txt
            ci_output/Clade_X1/eval_gene_predictions.txt
            ci_output/Clade_X1/gss_median.txt
            ci_output/Clade_X1/pss_median.txt
            ci_output/Clade_X1/bss_median.txt

      - name: Prepare binary artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifact
          cp build/bin/myesl2 artifact/${{ matrix.artifact }}
          # Bundle shared libs next to the binary
          cp build/bin/libopenblas* artifact/ 2>/dev/null || true
          cp build/bin/libgfortran* artifact/ 2>/dev/null || true
          cp build/bin/libquadmath* artifact/ 2>/dev/null || true
          # Fallback: if CMake didn't copy the Fortran runtime, grab from system
          if [ ! -f artifact/libgfortran* ] 2>/dev/null; then
            GFORT=$(gfortran --print-file-name=libgfortran.so.5 2>/dev/null \
                    || gcc --print-file-name=libgfortran.so.5 2>/dev/null || true)
            [ -f "$GFORT" ] && cp "$(realpath "$GFORT")" artifact/libgfortran.so.5
            # macOS: also grab libquadmath
            QUAD=$(gfortran --print-file-name=libquadmath.0.dylib 2>/dev/null || true)
            [ -f "$QUAD" ] && cp "$(realpath "$QUAD")" artifact/libquadmath.0.dylib
          fi

      - name: Prepare binary artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifact
          cp build/bin/Release/myesl2.exe artifact/${{ matrix.artifact }}.exe
          cp build/bin/Release/*.dll artifact/ 2>/dev/null || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact/
